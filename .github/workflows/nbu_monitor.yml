name: 宁波大学招生通知监测

# 触发条件
on:
  schedule:
    - cron: '*/30 * * * *' # 每 30 分钟运行一次
  workflow_dispatch: # 允许在网页上手动点击运行

# 赋予 GitHub Action 推送代码的权限
permissions:
  contents: write

jobs:
  run-monitor:
    runs-on: ubuntu-latest

    steps:
    - name: 检出代码
      uses: actions/checkout@v4  # 【已修复】升级到 v4 解决 Node.js 警告

    - name: 配置 Python 环境
      uses: actions/setup-python@v5 # 【已修复】升级到 v5 解决 Node.js 警告
      with:
        python-version: '3.10'

    - name: 安装依赖包
      run: pip install -r requirements.txt

    - name: 运行监测脚本
      env:
        EMAIL_PASS: ${{ secrets.EMAIL_PASS }}
      run: python nbu.py

    - name: 保存状态文件并推送回仓库
      run: |
        git config --local user.email "action@github.com"
        git config --local user.name "GitHub Action"
        git add . || true  # 【已修复】即使没有文件生成也不会报错崩溃
        git commit -m "自动更新监测状态" || echo "状态没有变化，无需提交"
        git push
